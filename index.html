      { year: 1725, title: "Descoberta do ouro em Goiás", description: "A descoberta do ouro em Goiás foi impulsionada por bandeirantes paulistas, entre eles, Bartolomeu Bueno da Silva (Anhanguera), que encontrou ouro próximo ao Rio Vermelho, fundando o arraial de Sant'Anna (hoje Cidade de Goiás)." },

      { year: 1759, title: "Expulsão dos Jesuítas do Brasil", description: "A expulsão dos jesuítas do Brasil, decretada pelo Marquês de Pombal, foi um evento motivado pela busca da Coroa por controle estatal, centralização administrativa e econômica, e por conflitos com a Companhia de Jesus." },

      { year: 1846, title: "Publicação de \"Sagarana\" (Guimarães Rosa)", description: "Obra de que renovou a literatura regionalista ao unir linguagem experimental e narrativas profundas sobre o sertão." },
      { year: 1848, title: "Fundação de Rio Verde", description: "Formação de um importante núcleo urbano no sudoeste de Goiás, ligado à expansão agropecuária e às rotas internas de ocupação do território." },
      { year: 1850, title: "Lei Eusébio de Queirós", description: "Lei que proibiu definitivamente o tráfico de africanos escravizados, resultado de pressões internacionais e mudanças econômicas internas." },
      { year: 1850, title: "Publicação de \"O Tempo e o Vento\" (Erico Verissimo)", description: "Saga histórica de que narra a formação social e política do Rio Grande do Sul ao longo de gerações." },
      { year: 1851, title: "Guerra do Prata", description: "Conflito regional em que o Brasil interveio contra Oribe e Rosas, buscando garantir estabilidade política e influência no Cone Sul." },
      { year: 1852, title: "Publicação de \"Memórias de um Sargento de Milícias\" (Manuel Antônio de Almeida)", description: "Romance de que rompe com o idealismo romântico ao retratar a vida popular com ironia e crítica social." },
      { year: 1854, title: "Iluminação a gás no Rio de Janeiro", description: "Marco da modernização urbana e símbolo do avanço industrial no Império." },
      { year: 1856, title: "Revolta dos Parceiros", description: "Levante de colonos suíços em Ibicaba (SP) contra abusos do sistema de parceria agrícola, denunciando exploração e falsas promessas de trabalho livre." },
      { year: 1857, title: "Greve dos tipógrafos (1857)", description: "Primeira greve registrada no Brasil, expressando o surgimento da consciência trabalhista e das lutas por melhores condições de trabalho." },
      { year: 1859, title: "Fundação de Jataí", description: "Consolidação de povoamento no sul goiano, vinculada à interiorização econômica e à expansão da fronteira agrícola." },
      { year: 1860, title: "Naufrágio do Corveta Camacuã", description: "Acidente naval que revelou fragilidades técnicas da Marinha imperial em um contexto de modernização militar." },
      { year: 1861, title: "Fundação da Caixa Econômica Federal", description: "Consolidação de povoamento no sul goiano, vinculada à interiorização econômica e à expansão da fronteira agrícola." },
      { year: 1862, title: "Questão Christie", description: "Crise diplomática entre Brasil e Inglaterra após apreensões de navios brasileiros, revelando tensões entre soberania nacional e imperialismo britânico." },
      { year: 1864, title: "Início da Guerra do Paraguai", description: "Maior conflito da história da América do Sul, envolvendo disputas regionais, interesses econômicos e redefinições de poder." },
      { year: 1865, title: "Rendição de Uruguaiana", description: "Vitória brasileira que marcou a expulsão das tropas paraguaias do território nacional." },
      { year: 1866, title: "Batalha de Tuiuti", description: "Combate mais sangrento da Guerra do Paraguai, com enormes perdas humanas, evidenciando o caráter devastador do conflito." },
      { year: 1868, title: "Passagem de Humaitá", description: "Operação estratégica que rompeu a principal linha defensiva paraguaia no Rio Paraguai." },
      { year: 1869, title: "Batalha de Campo Grande", description: "Etapa final da guerra do Paraguai, já marcada pelo colapso do exército paraguaio." },
      { year: 1870, title: "Morte de Solano López em Cerro Corá", description: "Encerramento simbólico da Guerra do Paraguai com a morte do líder paraguaio em Cerro Corá." },
      { year: 1871, title: "Fundação do Partido Republicano Paulista", description: "Organização política surgida na Convenção de Itu que articulou críticas à monarquia e ao centralismo imperial." },
      { year: 1872, title: "Publicação de \"Inocência\" (Visconde de Taunay)", description: "Romance de que combina regionalismo, sentimentalismo e crítica social." },
      { year: 1873, title: "Criação da Freguesia de Sant'Anna das Antas", description: "Criação administrativa que deu origem à cidade de Anápolis, fortalecendo a ocupação do interior goiano." },
      { year: 1874, title: "Revolta do Mucker", description: "Conflito de caráter messiânico no Rio Grande do Sul, reprimido pelo Estado imperial com violência." },
      { year: 1875, title: "Publicação de \"A Escrava Isaura\" (Bernardo Guimarães)", description: "Romance de que denunciou a escravidão e influenciou o debate abolicionista." },
      { year: 1876, title: "Visita de D. Pedro II aos Estados Unidos e Oriente Médio", description: "Visita aos Estados Unidos e ao Oriente Médio, reforçando o interesse do imperador por ciência, tecnologia e diplomacia." },
      { year: 1879, title: "Iluminação elétrica na Estação Central do Brasil", description: "Símbolo da modernização urbana e da incorporação de novas tecnologias no país." },
      { year: 1880, title: "Revolta do Vintém", description: "Protestos populares contra o aumento das tarifas de transporte urbano no Rio de Janeiro, evidenciando tensões sociais." },
      { year: 1881, title: "Publicação de \"O Mulato\" (Aluísio Azevedo)", description: "Romance de que inaugura o Naturalismo no Brasil, abordando racismo e determinismo social." },
      { year: 1883, title: "Publicação de \"O Abolicionista\" (Joaquim Nabuco)", description: "Obra de que sistematizou argumentos políticos e morais contra a escravidão." },
      { year: 1884, title: "Publicação de \"A Escrava\" (Maria Firmina dos Reis)", description: "Romance de pioneiro ao denunciar a escravidão a partir de uma perspectiva negra e feminina." },
      { year: 1885, title: "Publicação do Jornal \"O Publicador Goyano\"", description: "Jornal que contou com a atuação de tipógrafas negras, ampliando a participação feminina e afrodescendente no espaço público." },
      { year: 1888, title: "Abolição da Escravatura", description: "Fim legal da escravidão no Brasil com a assinatura da Lei Áurea , mas sem políticas de integração social para os libertos." },
      { year: 1889, title: "Proclamação da República", description: "A Primeira Constituição Republicana, consolidou a transição do Brasil de uma Monarquia unitária para uma República Federativa. Ela foi fortemente inspirada no modelo dos Estados Unidos, refletindo o desejo das elites regionais (especialmente os cafeicultores paulistas) por maior autonomia." },
      { year: 1889, title: "Nascimento de Cora Coralina", description: "O nascimento de Cora Coralina, na Cidade de Goiás (Vila Boa), é um marco que conecta o fim do Império à construção de uma das identidades literárias mais autênticas do Brasil. Embora tenha nascido no século XIX, sua obra tornou-a o maior símbolo da resiliência cultural goiana." },
      { year: 1891, title: "Primeira Constituição Republicana", description: "A Primeira Constituição Republicana consolidou a transição do Brasil de uma Monarquia unitária para uma República Federativa, moldando a estrutura do Estado conforme os interesses das elites regionais que lideraram o movimento republicano." },
      { year: 1891, title: "Promulgação da primeira Constituição de Goiás", description: "A Promulgação da primeira Constituição de Goiás representou a transição da antiga província para um Estado autônomo dentro da nova Federação Brasileira. Esse documento jurídico foi essencial para organizar o poder local e definir as regras de convivência política no cerrado após o fim da Monarquia." },
      { year: 1891, title: "Revolta de Canudos", description: "A Revolta de Canudos foi um dos conflitos mais sangrentos e simbólicos da história do Brasil, representando o choque entre o Brasil litorâneo, que buscava a modernização republicana, e o Brasil do sertão, marcado pela exclusão social e pelo misticismo religioso." },
      { year: 1893, title: "Comissão Cruls", description: "A Comissão Cruls, formalmente conhecida como Comissão Exploradora do Planalto Central do Brasil, foi a expedição científica fundamental que deu o primeiro passo concreto para a interiorização da capital federal, tirando do papel o desejo de mover o centro das decisões do Rio de Janeiro para o coração do país." },
      { year: 1893, title: "Massacre de Boiçucanga", description: "O Massacre de Boiçucanga (ou Combate de Boiçucanga) foi um episódio violento ocorrido no litoral de São Paulo, inserido no contexto das revoltas tenentistas que sacudiram o Brasil durante a República Velha." },
      { year: 1894, title: "Cerco da Lapa", description: "O Cerco da Lapa foi um dos episódios militares da Revolução Federalista, ocorrido no Paraná. Ele colocou frente a frente os \"pica-paus\" (legalistas que defendiam o governo republicano) e os \"maragatos\" (revolucionários que partiam do Sul com o objetivo de derrubar o presidente Floriano Peixoto)." },
      { year: 1895, title: "Criação do Museu do Ipiranga", description: "A Criação do Museu do Ipiranga (oficialmente Museu Paulista da USP) é um evento que mistura a celebração da independência com o desejo das elites paulistas de construir uma narrativa histórica onde São Paulo ocupa o papel central na formação da nação brasileira." },
      { year: 1895, title: "Questão de Palmas", description: "A Questão de Palmas foi uma disputa diplomática fundamental entre o Brasil e a Argentina pela posse de um vasto território no sul do país. Esse evento é considerado uma das maiores vitórias da diplomacia brasileira, pois garantiu a integridade das fronteiras sem a necessidade de um conflito armado." },
      { year: 1895, title: "Publicação de \"Bom-Crioulo\" (Adolfo Caminha)", description: "Considerado um dos momentos mais audaciosos e polêmicos da literatura brasileira. Inserida no movimento Naturalista, a obra rompeu tabus sociais extremos ao abordar temas que eram completamente silenciados pela sociedade da época." },
      { year: 1896, title: "Guerra de Canudos", description: "A Guerra de Canudos foi um dos conflitos mais sangrentos e simbólicos da história do Brasil, representando o choque entre o Brasil litorâneo, que buscava a modernização republicana, e o Brasil do sertão, marcado pela exclusão social, pela seca e pelo misticismo religioso." },
      { year: 1897, title: "Atentado contra o presidente Prudente de Morais", description: "O Atentado contra o Presidente Prudente de Morais foi uma tentativa de assassinato ocorrida durante uma cerimônia militar no Rio de Janeiro. O agressor, um soldado descontente, tentou atingir o presidente com uma arma que falhou e, em seguida, usou um punhal." },
      { year: 1898, title: "Funding Loan", description: "O Funding Loan foi um grande acordo de renegociação da dívida externa brasileira, realizado durante o governo de Campos Sales. Foi a solução encontrada para evitar que o Brasil declarasse falência (moratória) após a crise econômica gerada pelo Encilhamento." },
      { year: 1900, title: "Questão do Amapá", description: "A Questão do Amapá (ou Contestado Franco-Brasileiro) foi uma disputa diplomática entre o Brasil e a França pela posse do território ao norte do Rio Amazonas, que hoje corresponde ao estado do Amapá." },
      { year: 1901, title: "Criação do Instituto Soroterápico", description: "O Instituto Soroterápico Federal foi criado na Fazenda de Manguinhos, no Rio de Janeiro, com o objetivo inicial de fabricar soros e vacinas para combater a peste bubônica, que ameaçava o comércio e a saúde pública na capital." },
      { year: 1902, title: "Publicação de \"Canaã\" (Graça Aranha)", description: "A obra é um dos marcos do Pré-Modernismo brasileiro. O livro introduz o \"romance de ideias\", utilizando a ficção para debater os grandes dilemas da formação nacional e o impacto da imigração europeia no Brasil." },
      { year: 1903, title: "Chegada dos frades dominicanos a Goiás", description: "A chegada dos frades dominicanos a Goiás marcou o início de uma nova fase na evangelização e na educação do interior brasileiro, trazendo uma influência europeia (especificamente francesa) para o coração do cerrado." },
      { year: 1904, title: "Revolta da Vacina", description: "A Revolta da Vacina foi um levante popular no Rio de Janeiro motivado pelo descontentamento com as medidas sanitárias autoritárias e as reformas urbanas que expulsaram a população pobre do centro da cidade." },
      { year: 1904, title: "Questão do Pirara", description: "A Questão do Pirara foi uma disputa diplomática entre o Brasil e a Grã-Bretanha pela posse de uma região de fronteira entre a atual Guiana e o estado de Roraima. O conflito recebeu esse nome devido ao Rio Pirara, que atravessava a zona em litígio." },
      { year: 1905, title: "Nascimento de Santa Dica", description: "O Nascimento de Santa Dica (Benedita Cipriano Gomes) marca a origem de uma das figuras mais emblemáticas do messianismo e da resistência social no interior de Goiás. Ela se tornou uma líder espiritual e política que desafiou as estruturas de poder da República Velha." },
      { year: 1906, title: "Naufrágio do navio Aquidabã", description: "O naufrágio do encouraçado Aquidabã, o navio mais moderno da Marinha Brasileira na época, foi uma das maiores tragédias navais do país. Ele ocorreu na Baía de Jacuecanga, em Angra dos Reis, devido uma explosão interna." },
      { year: 1907, title: "Elevação de Anápolis à categoria de cidade", description: "A Elevação de Anápolis à categoria de cidade marcou o reconhecimento oficial do crescimento econômico e demográfico do antigo povoado de Santana das Antas, consolidando-o como um dos centros urbanos mais importantes do interior de Goiás." },
      { year: 1908, title: "Morte de Machado de Assis", description: "A Morte de Machado de Assis representou o fim de uma era para a cultura brasileira, marcando a partida daquele que é considerado o maior escritor da nossa literatura e o primeiro presidente da Academia Brasileira de Letras (ABL)." },
      { year: 1909, title: "Inauguração da energia elétrica na Cidade de Goiás", description: "A Inauguração da energia elétrica na Cidade de Goiás (antiga Vila Boa) foi um marco de modernização para a então capital do estado, simbolizando a chegada do progresso tecnológico ao interior do cerrado." },
      { year: 1909, title: "Descoberta da Doença de Chagas", description: "A Descoberta da Doença de Chagas é um dos episódios mais brilhantes da ciência mundial, pois foi a única vez na história da medicina em que um único pesquisador descreveu o ciclo completo de uma nova enfermidade." },
      { year: 1910, title: "Revolta da Chibata", description: "A Revolta da Chibata foi um motim liderado por marinheiros negros e pardos na Baía de Guanabara, no Rio de Janeiro, contra os castigos físicos e as péssimas condições de trabalho na Marinha Brasileira." },
      { year: 1910, title: "Criação do Serviço de Proteção aos Índios", description: "Criado pelo governo federal sob a liderança de Marechal Rondon. Foi a primeira instituição estatal dedicada à questão indígena, baseada no lema \"Morrer se preciso for, matar nunca\". O objetivo era integrar os povos originários à sociedade nacional de forma \"pacífica\"." },
      { year: 1911, title: "Bombardeio de Salvador", description: "Um ataque de artilharia ordenado pelo governo federal contra a capital baiana durante a presidência de Hermes da Fonseca. O objetivo era forçar a renúncia do governador opositor, consolidando a Política das Salvações (intervenções federais nos estados)." },
      { year: 1912, title: "Massacre da Bonifácia", description: "Conflito sangrento na região de Ipameri, Goiás. Envolveu disputas de terras e perseguição política entre grupos locais, resultando na morte de dezenas de pessoas. É um exemplo clássico da violência do coronelismo e das disputas de poder no interior goiano." },
      { year: 1913, title: "Chegada do primeiro automóvel na Cidade de Goiás", description: "Um marco da modernização tecnológica no estado. O veículo enfrentou estradas precárias e pontes estreitas para chegar à então capital. O evento atraiu multidões e simbolizou o início da transição do transporte por tração animal para o motorizado no cerrado." },
      { year: 1914, title: "Sedição de Juazeiro", description: "Levante armado no Ceará liderado pelo Padre Cícero e por oligarquias locais contra a intervenção do governo federal (Política das Salvações). O movimento conseguiu derrubar o governador imposto pelo presidente Hermes da Fonseca e reafirmou o poder político do clero e dos coronéis no sertão." },
      { year: 1915, title: "Publicação de \"A Menina do Narizinho Arrebitado\" (Monteiro Lobato)", description: "Obra inaugural de Monteiro Lobato que deu origem ao universo do Sítio do Picapau Amarelo. Marcou o nascimento da literatura infantil brasileira com identidade própria, misturando folclore nacional, fantasia e críticas sociais de forma inovadora." },
      { year: 1916, title: "Guerra do Contestado", description: "Conflito messiânico entre camponeses e o Exército na fronteira entre Paraná e Santa Catarina. A revolta estourou devido à expulsão de posseiros para a construção de uma ferrovia e pela exploração de madeira por empresas estrangeiras. Foi liderada por \"monges\" como José Maria." },
      { year: 1917, title: "Ataque ao navio Macau", description: "Navio cargueiro brasileiro torpedeado por um submarino alemão. O incidente foi o estopim que levou o Brasil a declarar guerra à Alemanha e entrar oficialmente na Primeira Guerra Mundial, abandonando sua posição de neutralidade." },
      { year: 1918, title: "Epidemia de Gripe Espanhola no Brasil", description: "Pandemia global que atingiu o Brasil de forma devastadora, inclusive matando o presidente eleito Rodrigues Alves. No Rio de Janeiro, o sistema de saúde colapsou, forçando a criação de hospitais de campanha e mudando permanentemente as políticas de higiene pública no país." },
      { year: 1919, title: "Publicação de \"Urupês\" (Monteiro Lobato)", description: "A publicação de Urupês, de Monteiro Lobato, marcou a criação do personagem Jeca Tatu, representação do homem do campo brasileiro. A obra denunciava as condições de abandono social que perpetuavam a miséria no interior do país." },
      { year: 1920, title: "Visita dos Reis da Bélgica", description: "A visita dos Reis da Bélgica ao Brasil representou a primeira visita oficial de uma monarquia europeia à República, simbolizando o reconhecimento internacional do regime republicano brasileiro e o fortalecimento das relações diplomáticas entre o Brasil e as potências europeias no início do século XX." },
      { year: 1922, title: "Semana de Arte Moderna", description: "A Semana de Arte Moderna marcou a ruptura com os padrões artísticos tradicionais e inaugurou o modernismo no Brasil, defendendo novas formas de expressão estética e a valorização de uma identidade cultural própria, em diálogo com as transformações da sociedade brasileira." },
      { year: 1922, title: "Fundação de Aparecida de Goiânia", description: "A fundação de Aparecida de Goiânia está ligada ao processo de expansão urbana e ocupação do entorno de Goiânia, resultante do crescimento populacional e da necessidade de novos núcleos habitacionais, consolidando-se como um importante polo urbano e econômico da região metropolitana." },
      { year: 1922, title: "Publicação de \"Pauliceia Desvairada\" (Mário de Andrade)", description: "A publicação de Pauliceia Desvairada, de Mário de Andrade, consolidou as propostas do modernismo brasileiro ao romper com a linguagem poética tradicional, introduzindo versos livres, experimentação formal e uma nova sensibilidade urbana voltada para a vida moderna." },
      { year: 1924, title: "Coluna Prestes", description: "A Coluna Prestes foi um movimento político-militar que percorreu extensas regiões do território brasileiro, denunciando as injustiças sociais e a corrupção do sistema oligárquico, além de contestar o poder das elites dominantes durante a Primeira República." },
      { year: 1924, title: "Revolta de Isabela", description: "A Revolta de Isabela, é um dos episódios mais curiosos e tensos da história de Goiás. Trata-se de uma rebelião armada no distrito de Isabela (hoje a cidade de Israelândia), motivada por conflitos políticos locais e resistência contra o autoritarismo do governo de Pedro Ludovico Teixeira." },
      { year: 1925, title: "Passagem da Coluna Prestes por Goiás", description: "A passagem da Coluna Prestes por Goiás integrou a estratégia de deslocamento do movimento pelo interior do país, buscando apoio popular e denunciando as desigualdades sociais e políticas, ao mesmo tempo em que evidenciou a fragilidade do controle estatal em regiões afastadas dos grandes centros urbanos" },
      { year: 1926, title: "Coluna Costa-Prestes parte para o exílio", description: "A Coluna Costa-Prestes partiu para o exílio após o esgotamento das condições de continuidade da luta armada no território nacional, encerrando um ciclo de enfrentamento ao regime oligárquico e simbolizando os limites e os impactos do tenentismo na política brasileira." },
      { year: 1928, title: "Publicação de \"A Bagaceira\" (José Américo de Almeida)", description: "A publicação de A Bagaceira, de José Américo de Almeida, marcou o início do romance regionalista moderno ao retratar com crítica social a realidade do sertão nordestino, evidenciando os impactos da seca, da pobreza e das desigualdades sobre a vida da população sertaneja." },
      { year: 1929, title: "Eleição de Júlio Prestes", description: "A eleição de Júlio Prestes representou a continuidade da política oligárquica da Primeira República, reforçando o domínio das elites estaduais; contudo, ele não chegou a assumir a presidência, em razão da ruptura política que colocou fim ao regime vigente." },
      { year: 1930, title: "Pedro Ludovico Teixeira nomeado Interventor em Goiás", description: "Pedro Ludovico Teixeira foi nomeado interventor em Goiás no contexto da reorganização política do país, simbolizando a ruptura com as antigas oligarquias estaduais e o fortalecimento do poder central na condução dos governos regionais." },
      { year: 1930, title: "Criação do Ministério da Educação", description: "A criação do Ministério da Educação representou a institucionalização das políticas educacionais no âmbito federal, reforçando o papel do Estado na organização do ensino, na formação cultural da população e na modernização do país." },
      { year: 1931, title: "Criação do Correio Aéreo Nacional (CAN)", description: "A criação do Correio Aéreo Nacional (CAN) marcou um avanço na integração territorial do país, ao utilizar a aviação para o transporte de correspondências, fortalecendo a comunicação entre regiões distantes e contribuindo para a presença do Estado em áreas de difícil acesso." },
      { year: 1932, title: "Revolução Constitucionalista", description: "A Revolução Constitucionalista foi um movimento armado liderado por setores paulistas que reivindicavam a convocação de uma Assembleia Constituinte e a restauração da ordem constitucional, expressando tensões políticas entre o poder central e as elites regionais." },
      { year: 1932, title: "Publicação de \"Menino de Engenho\" (José Lins do Rego)", description: "A publicação de Menino de Engenho, de José Lins do Rego, inaugurou o ciclo do romance da cana-de-açúcar ao retratar a decadência dos engenhos nordestinos, explorando as relações sociais, a memória e a formação do indivíduo em um contexto marcado por hierarquias e desigualdades." },
      { year: 1933, title: "Lançamento da Pedra Fundamental de Goiânia", description: "O lançamento da Pedra Fundamental de Goiânia simbolizou o início da construção da nova capital goiana, expressando o projeto de modernização administrativa e de reorganização do território estadual, em consonância com as propostas de integração e desenvolvimento regional." },
      { year: 1934, title: "Código de Minas", description: "O Código de Minas estabeleceu normas para a exploração dos recursos minerais, afirmando o controle do Estado sobre o subsolo e regulamentando a atividade mineradora, com o objetivo de organizar o setor e integrá-lo ao projeto de desenvolvimento nacional." },
      { year: 1935, title: "Chegada da Estrada de Ferro a Anápolis", description: "A chegada da Estrada de Ferro a Anápolis representou um marco no processo de integração econômica e territorial de Goiás, facilitando o escoamento da produção, estimulando o crescimento urbano e fortalecendo as conexões da região com outros centros do país." },
      { year: 1935, title: "Levante Comunista em Natal e Recife", description: "O levante ocorrido em Natal e Recife, faz parte do movimento maior conhecido historicamente como Intentona Comunista (termo pejorativo cunhado pelo governo para descrever um \"intento louco\")." },
      { year: 1936, title: "Criação do IBGE", description: "A criação do IBGE representou a consolidação de um órgão responsável pela produção de informações estatísticas e geográficas oficiais, fundamentais para o planejamento estatal, o conhecimento do território e a formulação de políticas públicas no Brasil." },
      { year: 1937, title: "Estado Novo", description: "O Estado Novo foi o período ditatorial da Era Vargas, caracterizado pela centralização total do poder, nacionalismo ufanista e uma forte política de controle social e propaganda." },
      { year: 1937, title: "Transferência da capital para Goiânia", description: "A transferência da capital de Goiás para Goiânia foi um dos marcos mais importantes da história política e urbana do Centro-Oeste brasileiro." },
      { year: 1937, title: "Criação do Serviço do Patrimônio Histórico e Artístico Nacional (SPHAN)", description: "A criação do Serviço do Patrimônio Histórico e Artístico Nacional (SPHAN) é o ponto de partida para a política pública de preservação no Brasil. " },
      { year: 1937, title: "Publicação de \"Capitães da Areia\" (Jorge Amado)", description: "Sua publicação foi um ato de resistência política e social. O livro é caracterizado pelo regionalismo crítico e pela denúncia das desigualdades brasileiras." },
      { year: 1938, title: "Ataque ao Palácio Guanabara", description: "O Ataque ao Palácio Guanabara, foi o ponto culminante do chamado Levante Integralista (ou Intentona Integralista). Esse evento é um exemplo clássico das tensões políticas da Era Vargas e da instabilidade que precedeu a consolidação da ditadura do Estado Novo." },
      { year: 1939, title: "Criação do Conselho Nacional do Petróleo", description: "A criação do Conselho Nacional do Petróleo (CNP), é um capítulo central do nacionalismo econômico brasileiro. Ele marca o momento em que o Estado assume o controle estratégico do subsolo e prepara o terreno para o que viria a ser a Petrobras décadas depois." },

      { year: 1942, title: "Naufrágio do navio Baependi", description: "O naufrágio do navio Baependi foi o estopim que forçou o governo de Getúlio Vargas a abandonar a neutralidade pragmática e declarar guerra às potências do Eixo." },
      { year: 1943, title: "CLT (Consolidação das Leis do Trabalho)", description: "A criação da Consolidação das Leis do Trabalho (CLT) é um dos marcos mais da história do Brasil, definindo as relações sociais e econômicas até os dias atuais." },
      { year: 1943, title: "Criação dos Territórios Federais", description: "A criação dos Territórios Federais, consolidada pelo Decreto-Lei nº 5.812, foi uma das medidas mais estratégicas da Era Vargas para a integração nacional e a defesa das fronteiras brasileiras durante a Segunda Guerra Mundial." },
      { year: 1944, title: "Força Expedicionária Brasileira (FEB)", description: "A criação e a atuação da Força Expedicionária Brasileira (FEB) representam a participação direta do Brasil no teatro de operações da Segunda Guerra Mundial. " },
      { year: 1944, title: "Tomada de Monte Castelo", description: "A Tomada de Monte Castelo é considerada a vitória militar mais emblemática da Força Expedicionária Brasileira (FEB) na Segunda Guerra Mundial. " },

      { year: 2014, title: "Morte do cantor Cristiano Araújo", description: "Falecimento do cantor sertanejo em um acidente que gerou grande comoção popular." },
      { year: 2015, title: "Primeira marcha com as mulheres negras", description: "Mobilização nacional que deu visibilidade às lutas e pautas das mulheres negras." },
      { year: 2015, title: "Funk e debates sobre censura", description: "Discussões públicas sobre preconceito, criminalização e liberdade cultural do funk." },
      { year: 2015, title: "Epidemia de Zika Vírus e Microcefalia", description: "Crise de saúde pública marcada pelo aumento de casos de microcefalia em bebês." },
      { year: 2015, title: "Impeachment de Dilma", description: "Processo político que resultou no afastamento da presidenta da República." },
      { year: 2016, title: "Tragédia com o avião da Chapecoense", description: "Acidente aéreo que vitimou atletas, comissão técnica e jornalistas." },
      { year: 2016, title: "Acidente no Parque Mutirama", description: "Ocorrência em parque de diversões que levantou debates sobre segurança em espaços de lazer." },
      { year: 2017, title: "Reconhecimento do funk como manifestação cultural", description: "Valorização oficial do funk como expressão cultural brasileira." },
      { year: 2017, title: "Massacre no Presídio de Alcaçuz", description: "Conflito violento entre facções dentro de um presídio do Rio Grande do Norte." },
      { year: 2017, title: "Prisão de Lula", description: "Episódio judicial que teve grande impacto político e social no país, relacionado à um presidente." },
      { year: 2018, title: "Intervenção Federal na Segurança do Rio de Janeiro", description: "Ação inédita em que o governo federal assumiu a segurança pública do estado." },
      { year: 2018, title: "Publicação de \"Torto Arado\"", description: "Lançamento de romance que ganhou destaque na literatura brasileira contemporânea." },
      { year: 2018, title: "Tragédia ambiental em Brumadinho", description: "Rompimento de barragem que causou mortes e graves danos ambientais." },
      { year: 2019, title: "Incêndio no Ninho do Urubu (Flamengo)", description: "Incêndio em centro de treinamento que vitimou jovens atletas." },
      { year: 2019, title: "Vazamento de óleo no litoral do Nordeste", description: "Desastre ambiental que atingiu praias e comunidades costeiras no Nordeste." },
      { year: 2020, title: "Pandemia de COVID-19", description: "Crise sanitária global que transformou profundamente a vida social e econômica, levando a muitas mortes." },
      { year: 2020, title: "Apagão no Amapá", description: "Falha prolongada no fornecimento de energia que afetou grande parte do estado no Norte do país." },
      { year: 2021, title: "Morte da cantora Marília Mendonça", description: "Falecimento da cantora sertaneja em acidente aéreo que mobilizou o país." },
      { year: 2021, title: "Enchentes na Bahia e Minas Gerais", description: "Chuvas intensas provocaram alagamentos, desabrigados e perdas humanas em estados do Sudeste e Nordeste." },
      { year: 2022, title: "Deslizamentos e chuvas em Petrópolis", description: "Tragédia climática com deslizamentos de terra e elevado número de vítimas em cidade do Rio de Janeiro." },
      { year: 2023, title: "Ataques de 8 de Janeiro", description: "Invasões e depredações de prédios públicos em Brasília após a posse do presidente Lula em seu terceiro mandato." },
      { year: 2023, title: "Tragédia das chuvas no Litoral Norte de SP", description: "Chuvas extremas que causaram deslizamentos e destruição de comunidades." },
      { year: 2023, title: "Crise humanitária Yanomami", description: "Situação de grave vulnerabilidade e genocídio enfrentado por povos indígenas Yanomami." },
      { year: 2024, title: "Enchentes históricas no Rio Grande do Sul", description: "Evento climático extremo que provocou destruição em larga escala no estado." },
      { year: 2025, title: "Prisão do Bolsonaro", description: "Prisão do ex-presidente do Brasil por tentativa de golpe de estado." },
      { year: 2018, title: "Assassinato de Marielle", description: "Assassinato político que simbolizou a violência contra lideranças negras e defensoras de direitos humanos." },
      { year: 2019, title: "Canonização de Irmã Dulce", description: "Reconhecimento religioso de Irmã Dulce como santa da Igreja Católica." }
    ];

    // --- HELPERS ---
    const formatYear = (year) => {
      if (year < 0) return `${Math.abs(year).toLocaleString('pt-BR')} a.C.`;
      return `${year}`;
    };

    // --- ICONES ---
    const HeartIcon = memo(({ filled }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`w-6 h-6 ${filled ? 'text-red-500' : 'text-slate-600'}`}>
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
      </svg>
    ));

    const ArrowDownIcon = memo(() => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="19 12 12 19 5 12" />
      </svg>
    ));

    // --- COMPONENTES ---
    const Card = memo(({ event, isPlaced, status = 'neutral', isCurrent = false }) => {
      let borderColor = 'border-slate-700';
      let bgColor = 'bg-slate-800';

      if (status === 'correct') { borderColor = 'border-green-500'; bgColor = 'bg-slate-800 ring-2 ring-green-500/50'; }
      else if (status === 'wrong') { borderColor = 'border-red-500'; bgColor = 'bg-slate-800 ring-2 ring-red-500/50'; }
      else if (isCurrent) { borderColor = 'border-brand-blue'; bgColor = 'bg-slate-800 shadow-xl shadow-brand-blue/20'; }

      return (
        <div className={`relative w-full p-3 md:p-4 rounded-xl border-2 ${borderColor} ${bgColor} transition-all duration-300 ease-out transform ${isCurrent ? 'hover:scale-105 cursor-grab active:cursor-grabbing max-w-sm' : ''} ${isPlaced ? 'md:min-h-[200px]' : ''} flex flex-col gap-2 select-none will-change-transform`}>
          <div className="flex justify-between items-start">
            {isPlaced ? <span className={`text-lg md:text-xl font-bold ${status === 'wrong' ? 'text-red-400' : 'text-brand-gold'}`}>{formatYear(event.year)}</span> : <span className="text-xl font-bold text-slate-500">????</span>}
          </div>
          <h3 className={`font-bold text-white leading-tight ${isPlaced ? 'text-base' : 'text-lg'}`}>{event.title}</h3>
          <p className="text-xs md:text-sm text-slate-300">{event.description}</p>
          {isPlaced && (
            <div className="absolute top-1/2 -left-[38px] w-4 h-4 rounded-full bg-slate-700 border-2 border-slate-500 z-10 hidden md:block">
               <div className={`w-full h-full rounded-full ${status === 'correct' ? 'bg-green-500' : status === 'wrong' ? 'bg-red-500' : 'bg-slate-400'}`}></div>
            </div>
          )}
        </div>
      );
    });

    const DropZone = memo(({ index, isActive, isHovered, isDisabled, isVisible, onPlace, onHover }) => {
      if (!isVisible) return <div className="w-4 h-4 md:w-12 md:h-1" />;
      const showGhost = isHovered && isActive;
      return (
        <div className={`relative transition-all duration-300 ease-out flex justify-center items-center shrink-0 w-full ${showGhost ? 'h-[220px]' : isActive ? 'h-16' : 'h-4'} md:h-full md:w-auto ${showGhost ? 'md:w-[240px]' : isActive ? 'md:w-12' : 'md:w-4'} ${isDisabled ? 'pointer-events-none' : ''}`}
          onDragEnter={(e) => { e.preventDefault(); if (!isDisabled && isActive) onHover(index); }}
          onDragOver={(e) => { e.preventDefault(); if (!isDisabled && isActive) onHover(index); }}
          onDrop={(e) => { e.preventDefault(); if (!isDisabled) onPlace(index); }}
          onClick={() => { if (!isDisabled && isActive) onPlace(index); }}
        >
          <div className={`absolute rounded-xl border-2 border-dashed border-slate-600 bg-slate-800/30 flex items-center justify-center transition-all duration-300 inset-x-0 top-2 bottom-2 md:inset-y-8 md:left-2 md:right-2 md:top-auto md:bottom-auto md:h-[300px] md:w-[220px] ${showGhost ? 'opacity-100 scale-100' : 'opacity-0 scale-90 hidden'} ${isActive ? 'pointer-events-none' : ''}`}>
             <span className="text-slate-500 font-bold uppercase tracking-widest text-sm animate-pulse text-center px-2">Solte para Posicionar</span>
          </div>
          <div className={`z-10 flex flex-row md:flex-col items-center gap-2 px-4 py-2 rounded-full transition-all duration-200 ${showGhost ? 'opacity-0' : 'opacity-100'} ${isActive ? 'bg-slate-800/50 text-slate-400 border border-slate-700 pointer-events-none' : 'opacity-0'}`}>
             <div className="rotate-0 md:-rotate-90"><ArrowDownIcon /></div>
          </div>
        </div>
      );
    });

    // --- APP PRINCIPAL ---
    const MODE_CONFIG = {
      classic: { lives: 3, handSize: 1, timeLimit: null, label: 'Clássico' },
      timed: { lives: 2, handSize: 1, timeLimit: 15, label: 'Contra o Tempo' },
      hardcore: { lives: 1, handSize: 3, timeLimit: null, label: 'Mão Cheia' },
    };

    function App() {
      const [gameMode, setGameMode] = useState('classic');
      const [gameState, setGameState] = useState('start');
      const [showAbout, setShowAbout] = useState(false);
      const [viewingTimeline, setViewingTimeline] = useState(false);
      const [timeline, setTimeline] = useState([]);
      const [hand, setHand] = useState([]); 
      const [eventQueue, setEventQueue] = useState([]);
      const [lives, setLives] = useState(3);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(null);
      const [leaderboard, setLeaderboard] = useState([]);
      const [playerName, setPlayerName] = useState('');
      const [isScoreSaved, setIsScoreSaved] = useState(false);
      const [leaderboardTab, setLeaderboardTab] = useState('classic');
      const [feedback, setFeedback] = useState({ isCorrect: null, placedIndex: null });
      const [draggedCardId, setDraggedCardId] = useState(null);
      const [dragHoverIndex, setDragHoverIndex] = useState(null);
      const timelineRef = useRef(null);
      const feedbackTimerRef = useRef(null);

      useEffect(() => {
        const saved = localStorage.getItem('cronocartas_leaderboard');
        if (saved) setLeaderboard(JSON.parse(saved));
      }, []);

      const startGame = useCallback((mode) => {
        if (feedbackTimerRef.current) clearTimeout(feedbackTimerRef.current);
        setGameMode(mode);
        setGameState('playing');
        setViewingTimeline(false);
        setScore(0);
        setLives(MODE_CONFIG[mode].lives);
        setFeedback({ isCorrect: null, placedIndex: null });
        setTimeLeft(MODE_CONFIG[mode].timeLimit);
        setIsScoreSaved(false);
        setPlayerName('');

        const fullDeck = initialEvents.map(e => ({ ...e, id: generateId() }));
        for (let i = fullDeck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }

        setTimeline([fullDeck[0]]);
        setHand(fullDeck.slice(1, 1 + MODE_CONFIG[mode].handSize));
        setEventQueue(fullDeck.slice(1 + MODE_CONFIG[mode].handSize));
      }, []);

      useEffect(() => {
        if (gameState === 'playing' && gameMode === 'timed' && timeLeft !== null && feedback.isCorrect === null) {
          if (timeLeft <= 0) { setLives(0); setGameState('gameover'); return; }
          const timerId = setInterval(() => { setTimeLeft(prev => (prev !== null ? prev - 1 : null)); }, 1000);
          return () => clearInterval(timerId);
        }
      }, [gameState, gameMode, timeLeft, feedback.isCorrect]);

      const handlePlaceCard = useCallback((insertIndex) => {
        if (feedback.isCorrect !== null || !draggedCardId) return;
        const cardIndex = hand.findIndex(c => c.id === draggedCardId);
        if (cardIndex === -1) return;
        const cardToPlace = hand[cardIndex];
        setDragHoverIndex(null);
        
        const prevDate = insertIndex === 0 ? -Infinity : timeline[insertIndex - 1].year;
        const nextDate = insertIndex === timeline.length ? Infinity : timeline[insertIndex].year;
        const cardDate = cardToPlace.year;
        const isCorrect = cardDate >= prevDate && cardDate <= nextDate;
        
        let actualCorrectIndex = insertIndex;
        if (!isCorrect) {
          for (let i = 0; i <= timeline.length; i++) {
             const p = i === 0 ? -Infinity : timeline[i - 1].year;
             const n = i === timeline.length ? Infinity : timeline[i].year;
             if (cardDate >= p && cardDate <= n) { actualCorrectIndex = i; break; }
          }
        }
        
        setFeedback({ isCorrect, placedIndex: actualCorrectIndex });
        const eventWithStatus = { ...cardToPlace, wasMissed: !isCorrect };
        setTimeline(prev => { const n = [...prev]; n.splice(actualCorrectIndex, 0, eventWithStatus); return n; });
        setHand(prev => { const n = [...prev]; n.splice(cardIndex, 1); return n; });
        if (isCorrect) setScore(s => s + 1); else setLives(l => l - 1);
        
        feedbackTimerRef.current = setTimeout(() => {
          setLives(curr => {
            if (curr <= 0) { setGameState('gameover'); return curr; }
            setEventQueue(q => {
              if (q.length === 0) return q;
              setHand(h => h.length >= MODE_CONFIG[gameMode].handSize ? h : [...h, q[0]]);
              return q.slice(1);
            });
            setFeedback({ isCorrect: null, placedIndex: null });
            setDraggedCardId(null);
            if (gameMode === 'timed') setTimeLeft(15);
            return curr;
          });
        }, 2000);
      }, [hand, timeline, draggedCardId, feedback.isCorrect, gameMode]);

      const handleSaveScore = () => {
        if (!playerName.trim()) return;
        const n = { id: generateId(), playerName: playerName.trim(), score, mode: gameMode, date: new Date().toISOString() };
        const u = [...leaderboard, n];
        setLeaderboard(u);
        localStorage.setItem('cronocartas_leaderboard', JSON.stringify(u));
        setIsScoreSaved(true);
      };

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
            <h1 className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-brand-gold mb-4 tracking-tighter">CRONOCARTAS</h1>
            <p className="text-slate-400 text-lg max-w-xl mb-12">Posicione os eventos históricos na ordem correta ou a história será reescrita (sem você).</p>
            <div className="flex flex-col gap-4 w-full max-w-xs">
              <button onClick={() => startGame('classic')} className="w-full px-6 py-4 bg-slate-800 hover:bg-brand-blue text-white font-bold rounded-xl border border-slate-700">Clássico (3 Vidas)</button>
              <button onClick={() => startGame('timed')} className="w-full px-6 py-4 bg-slate-800 hover:bg-red-600 text-white font-bold rounded-xl border border-slate-700">Contra o Tempo (15s)</button>
              <button onClick={() => startGame('hardcore')} className="w-full px-6 py-4 bg-slate-800 hover:bg-brand-gold hover:text-black text-white font-bold rounded-xl border border-slate-700">Mão Cheia (1 Vida)</button>
              <button onClick={() => setGameState('leaderboard')} className="w-full px-6 py-3 bg-slate-800 text-brand-gold font-bold rounded-xl">Leaderboard 🏆</button>
            </div>
          </div>
        );
      }

      if (gameState === 'leaderboard') {
        const ts = leaderboard.filter(e => e.mode === leaderboardTab).sort((a, b) => b.score - a.score).slice(0, 10);
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 z-50">
            <div className="max-w-3xl w-full bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
              <h2 className="text-3xl font-bold mb-6 text-brand-gold text-center">Melhores Pontuações</h2>
              <div className="flex gap-2 mb-6 justify-center">{['classic', 'timed', 'hardcore'].map(m => (<button key={m} onClick={() => setLeaderboardTab(m)} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors ${leaderboardTab === m ? 'bg-brand-blue text-white' : 'bg-slate-700 text-slate-400'}`}>{MODE_CONFIG[m].label}</button>))}</div>
              <div className="overflow-hidden rounded-xl border border-slate-700"><table className="w-full text-left"><thead className="bg-slate-900 text-slate-400 uppercase text-xs font-bold"><tr><th className="px-4 py-3">#</th><th className="px-4 py-3">Nome</th><th className="px-4 py-3 text-right">Pontos</th></tr></thead><tbody className="divide-y divide-slate-700">{ts.length > 0 ? ts.map((e, i) => (<tr key={e.id} className="hover:bg-slate-700/50"><td className="px-4 py-3">{i < 3 ? ['🥇', '🥈', '🥉'][i] : i + 1}</td><td className="px-4 py-3 font-semibold">{e.playerName}</td><td className="px-4 py-3 text-right text-brand-gold">{e.score}</td></tr>)) : <tr><td colSpan={3} className="px-4 py-8 text-center text-slate-500 italic">Sem registros.</td></tr>}</tbody></table></div>
              <button onClick={() => setGameState('start')} className="mt-8 w-full py-3 bg-slate-700 text-white font-bold rounded-xl">Voltar</button>
            </div>
          </div>
        );
      }

      if ((gameState === 'gameover' || gameState === 'victory') && !viewingTimeline) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center z-50">
            <h2 className="text-5xl font-bold mb-4">{gameState === 'victory' ? 'PARABÉNS!' : 'FIM DE JOGO'}</h2>
            <div className="text-8xl mb-6">{gameState === 'victory' ? '🎓' : '💀'}</div>
            <p className="text-7xl font-black text-brand-gold mb-8">{score}</p>
            <div className="w-full max-w-md mb-8 bg-slate-800 p-4 rounded-xl">
              {isScoreSaved ? <div className="text-green-400 font-bold">Salvo!</div> : (
                <div className="flex gap-2"><input type="text" placeholder="Seu Nome" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 text-white" /><button onClick={handleSaveScore} disabled={!playerName.trim()} className="px-6 py-2 bg-brand-blue text-white font-bold rounded-lg">Salvar</button></div>
              )}
            </div>
            <div className="flex gap-4 w-full max-w-md"><button onClick={() => setViewingTimeline(true)} className="flex-1 px-6 py-3 bg-slate-800 text-white rounded-lg">Revisar</button><button onClick={() => startGame(gameMode)} className="flex-1 px-6 py-3 bg-brand-blue text-white rounded-lg">De novo</button></div>
          </div>
        );
      }

      return (
        <div className={`h-screen flex flex-col overflow-hidden ${gameMode === 'timed' && timeLeft <= 5 ? 'animate-alarm' : ''}`}>
          <header className="relative flex-none h-16 bg-slate-900/90 border-b border-slate-800 flex items-center justify-between px-6 z-20">
            <div onClick={() => setGameState('start')} className="font-bold text-xl cursor-pointer">CronoCartas</div>
            
            {gameMode === 'timed' && !viewingTimeline && timeLeft !== null && (
              <div className={`absolute left-1/2 -translate-x-1/2 font-mono text-2xl font-bold ${timeLeft <= 5 ? 'text-red-500 scale-110' : 'text-white'}`}>
                {timeLeft}s
              </div>
            )}

            <div className="flex items-center gap-6">
              {!viewingTimeline && <div className="flex gap-1">{[...Array(MODE_CONFIG[gameMode].lives)].map((_, i) => <HeartIcon key={i} filled={i < lives} />)}</div>}
              <div className="bg-slate-800 px-4 py-1 rounded-full border border-slate-700 flex gap-4">
                 <div><span className="text-slate-400 text-sm font-bold mr-2">PONTOS</span><span className="text-brand-gold font-bold">{score}</span></div>
              </div>
              {viewingTimeline && <button onClick={() => setGameState('start')} className="text-red-400 font-bold">SAIR</button>}
            </div>
          </header>
          <main className="flex-1 flex flex-col relative overflow-hidden">
            <div ref={timelineRef} className="flex-1 p-6 relative bg-slate-950/50 flex flex-col md:flex-row md:items-center overflow-x-auto overflow-y-auto">
              <div className="flex flex-col md:flex-row md:items-center relative z-10 min-w-full">
                {timeline.map((event, index) => (
                  <Fragment key={event.id}>
                    <DropZone index={index} isActive={!!draggedCardId} isHovered={dragHoverIndex === index} isDisabled={!!feedback.isCorrect || viewingTimeline} isVisible={!viewingTimeline} onPlace={handlePlaceCard} onHover={setDragHoverIndex} />
                    <div className="shrink-0 w-full md:w-[220px] transition-all"><Card event={event} isPlaced={true} status={feedback.placedIndex === index && feedback.isCorrect !== null ? (feedback.isCorrect ? 'correct' : 'wrong') : (event.wasMissed ? 'wrong' : 'neutral')} /></div>
                  </Fragment>
                ))}
                <DropZone index={timeline.length} isActive={!!draggedCardId} isHovered={dragHoverIndex === timeline.length} isDisabled={!!feedback.isCorrect || viewingTimeline} isVisible={!viewingTimeline} onPlace={handlePlaceCard} onHover={setDragHoverIndex} />
              </div>
            </div>
            {!viewingTimeline && (
              <div className="bg-slate-900 border-t border-slate-800 p-4"><div className="flex justify-center gap-4">{hand.map((card) => (<div key={card.id} draggable={feedback.isCorrect === null} onDragStart={() => setDraggedCardId(card.id)} onDragEnd={() => setDraggedCardId(null)} className={`${feedback.isCorrect !== null ? 'opacity-50' : 'hover:-translate-y-2'} transition-all cursor-grab`}><Card event={card} isPlaced={false} isCurrent={true} /></div>))}</div></div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
